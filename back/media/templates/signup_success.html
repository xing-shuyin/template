<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>激活您的账号</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      padding: 20px;
      text-align: center;
    }

    .header {
      font-size: 28px;
      color: #4CAF50;
      margin-bottom: 10px;
    }

    .subheader {
      font-size: 18px;
      color: #666;
      margin-bottom: 30px;
    }

    .content {
      font-size: 16px;
      line-height: 1.6;
      color: #555;
    }

    .footer {
      font-size: 14px;
      color: #999;
      margin-top: 30px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">🎉 注册成功！</div>
    <div class="subheader">请激活您的账号</div>
    <div class="content">
      <p>感谢您注册我们的服务！请注意，您需要激活您的账号以完成注册。</p>
      <p>请检查您的邮箱并按照指示激活您的账号。</p>
    </div>
    <div class="footer">
      如果您没有请求此操作，请忽略此邮件。
      谢谢！您的公司名称
    </div>
  </div>
</body>

</html>
