<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>重置密码</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f7fc;
        margin: 0;
        padding: 0;
      }

      .container {
        width: 100%;
        max-width: 400px;
        margin: 50px auto;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        padding: 20px;
      }

      h2 {
        text-align: center;
        color: #333;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #555;
      }

      input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }

      input[type="submit"] {
        width: 100%;
        padding: 12px;
        border: none;
        background-color: #4caf50;
        color: white;
        font-size: 16px;
        border-radius: 4px;
        cursor: pointer;
      }

      input[type="submit"]:hover {
        background-color: #45a049;
      }

      .error {
        color: red;
        font-size: 12px;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>重置密码</h2>
      <form id="resetPasswordForm" method="POST">
        <div class="form-group">
          <label for="old_password">当前密码</label>
          <input
            type="password"
            id="old_password"
            name="old_password"
            required
          />
        </div>
        <div class="form-group">
          <label for="new_password">新密码</label>
          <input
            type="password"
            id="new_password"
            name="new_password"
            required
          />
          <div id="newPasswordError" class="error"></div>
        </div>
        <div class="form-group">
          <label for="new_password_confirm">确认新密码</label>
          <input
            type="password"
            id="new_password_confirm"
            name="new_password_confirm"
            required
          />
          <div id="confirmPasswordError" class="error"></div>
        </div>
        <div class="form-group">
          <input type="submit" value="提交重置密码" />
        </div>
      </form>
    </div>

    <script>
      // 表单验证
      document
        .getElementById("resetPasswordForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          let isValid = true;

          // 清空之前的错误提示
          document.getElementById("newPasswordError").innerText = "";
          document.getElementById("confirmPasswordError").innerText = "";
          const old_password = document.getElementById("old_password").value;
          const new_password = document.getElementById("new_password").value;
          const new_password_confirm = document.getElementById(
            "new_password_confirm"
          ).value;

          // 密码一致性检查
          if (new_password !== new_password_confirm) {
            isValid = false;
            document.getElementById("confirmPasswordError").innerText =
              "新密码与确认密码不一致";
          }

          // 密码强度检查
          if (new_password.length < 6) {
            isValid = false;
            document.getElementById("newPasswordError").innerText =
              "新密码必须至少包含 6 个字符";
          }

          fetch("/api/login/change_password", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              old_password: old_password,
              new_password: new_password,
              new_password_confirm: new_password_confirm,
            }),
          }).then((res) =>
            res.json().then((data) => {
              console.log(data);
              if (data.success) {
                window.location.href = "/api/login";
              } else {
                alert(data.detail);
              }
            })
          );
        });

      // 如果表单无效，阻止提交
    </script>
  </body>
</html>
