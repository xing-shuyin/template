<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录页面</title>
  <style>
    body {
      font-family: "Arial", sans-serif;
      background: linear-gradient(135deg, #4e54c8, #8f94fb);
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      max-width: 400px;
      background: rgba(209, 208, 208, 0.966);
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      padding: 30px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .header {
      font-size: 32px;
      color: #000000;
      margin-bottom: 20px;
    }

    .input-group {
      /* margin-bottom: 15px; */
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      color: #000000;
    }

    .input-group input {
      width: calc(100% - 20px);
      /* 减去左右内边距 */
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.8);
      color: #333;
      margin: 0 auto;
      /* 居中 */
    }

    .button {
      width: 100%;
      padding: 10px;
      color: #ffffff;
      background-color: #4caf50;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
      font-size: 16px;
      margin-bottom: 10px;
      /* 增加间距 */
    }

    .button:hover {
      background-color: #45a049;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #000000;
    }

    .register-link {
      color: #4caf50;
      text-decoration: none;
      font-weight: bold;
      display: block;
      /* 使链接在新行显示 */
      margin-top: 10px;
      /* 增加上边距 */
    }

    .register-link:hover {
      text-decoration: underline;
    }

    .error {
      color: red;
      margin-bottom: 10px;
      width: 100%;
      text-align: left;
      font-family: PingFangSC-Regular;
      font-size: 12px;
      color: #f15533;
      letter-spacing: 0.37px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">欢迎回来！</div>
    <form id="form" method="POST">
      <div class="input-group">
        <label for="username">邮箱：</label>
        <input type="email" id="username" name="username" required />
      </div>
      <div class="input-group">
        <label for="password">密码：</label>
        <input type="password" id="password" name="password" required />
      </div>
      <div class="input-group">
        <label for="captcha">验证码：</label>
        <div style="display: flex;">
          <div>
            <input type="text" id="captcha" name="captcha" required />
          </div>
          <div>
            <img id="captcha_img" src="" onclick="get_captcha()" />
          </div>
        </div>

      </div>
      <div class="error"></div>
      <button type="button" class="button">登录</button>
    </form>
    <a href="/api/login/register/" class="register-link">还没有账号？点击注册</a>
    <div class="footer">
      <p>忘记密码？<a href="/api/login/reset" target="_blank">重置密码</a></p>
    </div>
  </div>
  <script>


    const form = document.getElementById("form");
    const captcha_img = document.getElementById("captcha_img");
    const sub_btn = document.querySelector(".button");
    const error = document.querySelector(".error");
    sub_btn.addEventListener("click", function (event) {
      const formdata = new FormData(form);
      fetch("/api/login/access/", {
        method: "POST",
        body: formdata,
      })
        .then((response) => {
          if (response.status === 200) {
            error.innerHTML = "登陆成功!";
            window.location.href = "/api/user/me";
            // return response.json();
          } else {
            error.innerHTML = "账号或密码不正确";
          }
        })
    });

    const get_captcha = () => {
      fetch("/api/captcha", {
        credentials: "include",
      })
        .then((response) => {
          return response.blob();
        })
        .then((blob) => {
          const url = URL.createObjectURL(blob);
          captcha_img.src = url;
        })
        .then((data) => {
          console.log(data);
        });
    }
    get_captcha()



    form.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault(); // 阻止表单默认的提交行为
        sub_btn.click(); // 模拟按钮点击事件
      }
    });
  </script>
</body>

</html>
