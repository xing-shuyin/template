<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Welcome to Our Service!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      padding: 20px;
      text-align: center;
    }

    .header {
      font-size: 28px;
      color: #4CAF50;
      margin-bottom: 10px;
    }

    .subheader {
      font-size: 18px;
      color: #666;
      margin-bottom: 30px;
    }

    .content {
      font-size: 16px;
      line-height: 1.6;
      color: #555;
    }

    .details {
      font-weight: bold;
      color: #333;
      background-color: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      color: #ffffff;
      background-color: #6e8efb;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .button:hover {
      background-color: #5a73e0;
    }

    .footer {
      font-size: 14px;
      color: #999;
      margin-top: 30px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">🎉 欢迎加入！</div>
    <div class="subheader">您的账号已成功创建</div>
    <div class="content">
      <p>您好，{{ user_name }}，</p>
      <p>感谢您注册！以下是您的账号信息：</p>
      <div class="details">账号：{{ user_email }}</div>
      <div class="details">密码：{{ password }}</div>
      <p>请妥善保管您的账号信息。</p>
      <a href="{{ login_url }}" class="button">立即登录</a>
    </div>
    <div class="footer">
      如果您有任何问题，请随时联系我们的支持团队。
      谢谢！BLOGER
    </div>
  </div>
</body>

</html>
