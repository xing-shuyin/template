<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>密码重置请求</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      padding: 20px;
      text-align: center;
    }

    .header {
      font-size: 28px;
      color: #4CAF50;
      margin-bottom: 10px;
    }

    .subheader {
      font-size: 18px;
      color: #666;
      margin-bottom: 30px;
    }

    .content {
      font-size: 16px;
      line-height: 1.6;
      color: #555;
    }

    .details {
      font-weight: bold;
      color: #333;
      background-color: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      color: #ffffff;
      background-color: #6e8efb;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .button:hover {
      background-color: #5a73e0;
    }

    .footer {
      font-size: 14px;
      color: #999;
      margin-top: 30px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">🔐 密码重置请求</div>
    <div class="subheader">我们收到了您的密码重置请求</div>
    <div class="content">
      <p>您好，{{ user_name }}，</p>
      <p>您请求重置密码。请点击以下按钮以重置您的密码：</p>
      <a href="{{ reset_link }}" class="button">重置密码</a>
      <p class="details">注意：此链接将在{{ expiration_time }}内有效。</p>
    </div>
    <div class="footer">
      如果您没有请求重置密码，请忽略此邮件。
      谢谢！BLOGER
    </div>
  </div>
</body>

</html>
