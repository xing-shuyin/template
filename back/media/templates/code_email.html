<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>验证码发送</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      padding: 20px;
      text-align: center;
    }

    .header {
      font-size: 28px;
      color: #4CAF50;
      margin-bottom: 10px;
    }

    .subheader {
      font-size: 18px;
      color: #666;
      margin-bottom: 30px;
    }

    .content {
      font-size: 16px;
      line-height: 1.6;
      color: #555;
    }

    .code {
      font-weight: bold;
      color: #333;
      background-color: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
      font-size: 24px;
      margin: 10px 0;
    }

    .footer {
      font-size: 14px;
      color: #999;
      margin-top: 30px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">🔑 验证码已发送</div>
    <div class="subheader">您请求的验证码如下</div>
    <div class="content">
      <p>您好，{{ user_name }}，</p>
      <p>您的验证码是：</p>
      <div class="code">{{ verification_code }}</div>
      <p>请在{{ expiration_time }}内输入验证码。</p>
    </div>
    <div class="footer">
      如果您没有请求验证码，请忽略此邮件。
      谢谢！BLOGER
    </div>
  </div>
</body>

</html>
