# ============================================================
# Docker Compose - 全栈快速部署
# ============================================================
# 使用方法：
#   1. 复制 .env.docker 为 .env 并修改配置
#   2. docker compose up -d
#   3. 访问 http://localhost
# ============================================================

name: blog

services:
  # ---------- PostgreSQL 数据库 ----------
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${PG_DATABASE:-blog}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?请设置 PG_PASSWORD 环境变量}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-blog}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - blog-network

  # ---------- Redis 缓存 ----------
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blog-network

  # ---------- 后端 FastAPI 服务 ----------
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: blog-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - IS_PRODUCTION=true
      - PG_HOST=postgres
      - REDIS_HOST=redis
      - CACHE_BACKEND=redis
    volumes:
      # 持久化上传的媒体文件
      - media_data:/app/media
      # 持久化日志
      - backend_logs:/app/log
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blog-network

  # ---------- 前端 + Nginx 服务 ----------
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: blog-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # 映射到宿主机 80 端口
      - "80:80"
    environment:
      - BACKEND_URL=http://backend:8090
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - blog-network

# ---------- 持久化卷 ----------
volumes:
  postgres_data:
    name: blog-postgres-data
  redis_data:
    name: blog-redis-data
  media_data:
    name: blog-media-data
  backend_logs:
    name: blog-backend-logs

# ---------- 网络 ----------
networks:
  blog-network:
    name: blog-network
    driver: bridge
